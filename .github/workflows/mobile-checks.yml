name: Mobile checks

on:
  push:
    branches: [main]
    paths: ["mobile/**", ".github/workflows/mobile-checks.yml"]
  pull_request:
    paths: ["mobile/**", ".github/workflows/mobile-checks.yml"]

jobs:
  test-and-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
      - run: npm test -- --ci
      - run: npx tsc --noEmit
