name: Mobile checks

on:
  push:
    branches: [main]
    paths: ["mobile/**", ".github/workflows/mobile-checks.yml"]
  pull_request:
    paths: ["mobile/**", ".github/workflows/mobile-checks.yml"]

jobs:
  test-and-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
      - run: npm test -- --ci
      # Non-blocking for now: the codebase has 24 pre-existing type errors
      # (predating this workflow) that still need triage — see plan file.
      # Reports in the log but does not fail the build until those are fixed.
      - run: npx tsc --noEmit || true
      - run: npm run lint
